<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="96" height="96" rx="20" fill="url(#gradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E3DC5"/>
      <stop offset="100%" stop-color="#1E5AFF"/>
    </linearGradient>
  </defs>
  
  <!-- ZIPA Text -->
  <text x="48" y="52" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" letter-spacing="1">ZIPA</text>
  
  <!-- Agency Text -->
  <text x="48" y="70" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" letter-spacing="0.8">AGENCY</text>
