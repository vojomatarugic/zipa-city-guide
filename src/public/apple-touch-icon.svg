<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="180" height="180" rx="40" fill="url(#gradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E3DC5"/>
      <stop offset="100%" stop-color="#1E5AFF"/>
    </linearGradient>
  </defs>
  
  <!-- ZIPA Text - Larger and centered -->
  <text x="90" y="95" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="2">ZIPA</text>
  
  <!-- Agency Text -->
  <text x="90" y="130" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" letter-spacing="1.5">AGENCY</text>
